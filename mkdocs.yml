site_name: lbg-pipelines
site_description: DESC LBG topical team — analysis pipelines and results
repo_url: https://github.com/LSSTDESC/lbg-pipelines
repo_name: LSSTDESC/lbg-pipelines
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - attr_list
  - pymdownx.snippets:
      base_path: [.]

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Pipelines: pipelines.md
  - Notebooks: notebooks.md
  - Data: data.md
  - Contributing: contributing.md

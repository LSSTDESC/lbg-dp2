# Site config for an interactive allocation (salloc).
# Passed directly to ceci by run_interactive.sh and run_debug.sh.
# Overrides ceci's built-in nersc-interactive preset, which uses an outdated
# max_threads default (number of nodes rather than cores per node).

launcher:
  name: mini

site:
  name: nersc-interactive
  max_threads: 128

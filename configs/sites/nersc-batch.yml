# Site config for batch jobs (sbatch via parsl).
# Overrides ceci's built-in nersc-batch preset, which targets Cori (Haswell)
# rather than Perlmutter (cpu constraint) and defaults to the debug queue.

launcher:
  name: parsl
  max_init_time: 300

site:
  name: nersc-batch
  max_threads: 128
  nodes: 4
  walltime: "04:00:00"
  account: m1727
  constraint: cpu
  qos: regular
